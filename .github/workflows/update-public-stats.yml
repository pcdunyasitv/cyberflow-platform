name: Update public statistics

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-public-statistics
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update README statistics
        env:
          CYBERFLOW_STATS_ENDPOINT: https://us-central1-yenimetotsiberguvenlik.cloudfunctions.net/publicCyberFlowStats
        run: node scripts/update-stats.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No statistics changes."
            exit 0
          fi

          git config user.name "cyberflow-stats-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/public-stats.json
          git commit -m "İstatistikleri güncelle"
          git push
